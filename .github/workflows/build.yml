name: Build EXE
on: [push]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      - tqdm install python
      - run: pip install pyinstaller
      - run: pyinstaller --onefile seu_script.py
      - name: Upload EXE
        uses: actions/upload-artifact@v3
        with:
          path: dist/seu_script.exe
